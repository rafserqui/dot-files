enable_audio_bell no

include themes/rose-pine-moon.conf

font_family     JetBrainsMono Nerd Font
font_size 14

disable_ligatures never

url_color #61afef

url_style curly

cursor_shape beam
cursor_beam_thickness 1.8

mouse_hide_wait 3.0
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

background_opacity 0.99


shell zsh
